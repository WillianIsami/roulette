version: "3.8"

services:
  db:
    image: postgres:15
    container_name: db.rlt
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: server.rlt
    build:
      context: ./server
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - ./server/api/.env
    volumes:
      - ./server:/opt/server
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: frontend.rlt
    build:
      context: ./frontend
    ports:
      - "${CLIENT_PORT}:8000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/opt/app
    depends_on:
      - backend

volumes:
  postgres_data:
